name: Catalog

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun --filter dripline build
      - name: Install all plugins
        run: |
          cd packages/dripline
          bun run dev -- init 2>/dev/null || true
          for p in ../plugins/*/src/index.ts; do
            name=$(basename "$(dirname "$(dirname "$p")")")
            bun run dev -- plugin install "$p" 2>/dev/null && echo "✓ $name" || echo "✗ $name (skipped)"
          done
      - name: Generate catalog data
        run: |
          cd packages/dripline
          bun run dev -- tables --json 2>/dev/null | sed -n '/^\[/,$ p' > /tmp/tables.json
          cd ../..
          node -e "
            const tables = require('/tmp/tables.json');
            const icons = require('./packages/plugins/icons.json');
            const plugins = {};
            for (const t of tables) {
              const p = t.plugin;
              if (!plugins[p]) plugins[p] = {name: p, tables: [], icon: icons[p] || {}};
              plugins[p].tables.push({
                name: t.table,
                description: t.description || '',
                columns: (t.columns || []).map(c => ({name: c.name, type: c.type}))
              });
            }
            const catalog = Object.values(plugins).sort((a,b) => a.name.localeCompare(b.name));
            console.log('const CATALOG = ' + JSON.stringify(catalog) + ';');
            console.log('const TOTAL_PLUGINS = ' + catalog.length + ';');
            console.log('const TOTAL_TABLES = ' + tables.length + ';');
          " > docs/catalog-data.js
          echo "Generated catalog: $(wc -c < docs/catalog-data.js) bytes"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
