name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [dripline, dripyard]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      # dripyard imports from dripline's dist/ — build dripline first.
      - run: bun --filter dripline build
      - run: bun --filter ${{ matrix.package }} build
      - run: bun --filter ${{ matrix.package }} test

  publish:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      # Publish one package at a time so a failure in one doesn't silently skip the other.
      fail-fast: false
      matrix:
        package: [dripline, dripyard]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: bun install
      # dripyard imports from dripline's dist/ — build dripline first.
      - run: bun --filter dripline build
      - run: bun --filter ${{ matrix.package }} build
      - name: Publish to npm
        working-directory: packages/${{ matrix.package }}
        run: |
          if echo "${{ github.ref_name }}" | grep -qE '(rc|alpha|beta)'; then
            npm publish --tag next --access public
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
